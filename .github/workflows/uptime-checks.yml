name: Scheduled uptime checks

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Request GitHub identity token
        id: oidc
        shell: bash
        run: |
          token_response="$(curl --fail --silent --show-error \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=pulseops-api")"
          token="$(python -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "$token_response")"
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Wake API and run due monitors
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          curl --fail --show-error --retry 3 --retry-delay 15 \
            -X POST "https://pulseops-api-qlqu.onrender.com/api/checks/run" \
            -H "Authorization: Bearer $OIDC_TOKEN"
